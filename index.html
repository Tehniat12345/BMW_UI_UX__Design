<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW | Sheer Driving Pleasure</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }

        .bmw-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Dark Road Background */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2070') no-repeat center center/cover;
            padding: 20px;
        }

        .main-card {
            width: 95%;
            max-width: 1200px;
            height: 80vh;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 20px;
            display: flex;
            box-shadow: 0 40px 100px rgba(0, 102, 255, 0.2);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        /* Left Side: Performance Content */
        .info-panel {
            flex: 1.2;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
            z-index: 2;
        }

        .m-tag {
            font-family: 'Orbitron', sans-serif;
            color: #0066ff;
            font-size: 1rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.5rem;
            line-height: 1;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        h1 span {
            color: transparent;
            -webkit-text-stroke: 1px #fff;
        }

        p {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 40px;
            font-size: 1.1rem;
            max-width: 480px;
        }

        .drive-btn {
            padding: 20px 50px;
            background: #0066ff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            width: fit-content;
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.4);
        }

        .drive-btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
        }

        /* Right Side: Car Visual */
        .visual-panel {
            flex: 1.5;
            position: relative;
            overflow: hidden;
        }

        .car-img {
            width: 100%;
            height: 100%;
            background: url('https://i.pinimg.com/736x/95/f3/d7/95f3d7b139b3d57380aefc7d54af985b.jpg') no-repeat center center/cover;
            transition: 1s ease-in-out;
        }

        .main-card:hover .car-img {
            transform: scale(1.1) translateX(-20px);
        }

        /* Tech Overlay Decor */
        .grid-decor {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(0, 102, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bmw-wrapper">
        <div class="main-card">
            <div class="grid-decor"></div>
            
            <!-- Information Panel -->
            <div class="info-panel">
                <div class="m-tag">THE NEXT GENERATION</div>
                <h1>Pure <br><span>Adrenaline.</span></h1>
                <p>Engineered for the driver who demands more. Experience the perfect fusion of high-performance technology and legendary design.</p>
                
                <a href="#" class="drive-btn">Build Your Own</a>
            </div>

            <!-- Visual Panel -->
            <div class="visual-panel">
                <div class="car-img"></div>
            </div>
        </div>
    </div>

</body>
</html>
